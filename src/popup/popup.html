<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CheckPlease</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="cp-popup">
    <div class="cp-logo-row">
      <div class="cp-logo">CP</div>
      <div class="cp-name">CheckPlease</div>
    </div>
    <p id="status" class="cp-status">Loading&hellip;</p>
    <p class="cp-tagline">Quick check before you pay.</p>
    <div class="cp-buttons">
      <button id="open-test" type="button">Test the modal</button>
      <button id="open-options" type="button">Settings &amp; License</button>
    </div>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
